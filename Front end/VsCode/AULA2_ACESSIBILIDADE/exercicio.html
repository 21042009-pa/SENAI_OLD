<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./src/styles/exercicio.css">
    <title>EcoCycle - Sustentabilidade Acessível</title>
</head>
<body>
    <!-- Cabeçalho principal do site -->
    <header id="cabecalho-eco">
        
        <!-- Título do site -->
        <h1>EcoCycle</h1>
        
        <!-- Botão de busca com ícone e acessibilidade -->
        <button class="btn-busca" aria-label="Pesquisar notícias">🔍</button>
        
        <!-- Quebras de linha para espaçamento visual -->
        <br><br>
        
        <!-- Menu de navegação -->
        <nav>
            <a href="#" class="link-nav">Home</a>
            <a href="#" class="link-nav">Dicas</a>
            <a href="#" class="link-nav">Contato</a>
        </nav>
    </header>

    <!-- Conteúdo principal da página -->
    <main>
        
        <!-- Seção que agrupa a lista de notícias -->
        <section class="lista-noticias">
            
            <!-- Card individual de notícia -->
            <article class="card-noticia">
                
                <!-- Imagem ilustrativa da notícia com texto alternativo acessível -->
                <img src="./src/image/reciclagem.jpg" 
                     alt="Família sorridente separando garrafas e papéis em cestos de reciclagem coloridos">
                
                <!-- Título da notícia -->
                <h2>Guia de Reciclagem 2026</h2>
                
                <!-- Resumo da notícia -->
                <p>Aprenda o passo a passo para reduzir o lixo na sua casa hoje mesmo.</p>
                
                <!-- Botão para acessar o conteúdo completo da notícia -->
                <button class="btn-leitura" aria-label="Ler notícia sobre Reciclagem">Leia Mais</button>
            </article>
        </section>
    </main>
</body>
</html>
